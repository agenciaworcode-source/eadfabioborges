# Nginx config — EAD Mentoria Fábio Borges
# Copiar para: /etc/nginx/sites-available/ead
# Ativar com: ln -s /etc/nginx/sites-available/ead /etc/nginx/sites-enabled/

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    server_name ead.fabioborgesoficial.com.br staging.fabioborgesoficial.com.br;
    return 301 https://$host$request_uri;
}

# HTTPS — Produção
server {
    listen 443 ssl http2;
    server_name ead.fabioborgesoficial.com.br;

    # SSL (gerenciado pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/ead.fabioborgesoficial.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ead.fabioborgesoficial.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache para assets estáticos do Next.js
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy reverso para Next.js (PM2)
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# HTTPS — Staging
server {
    listen 443 ssl http2;
    server_name staging.fabioborgesoficial.com.br;

    ssl_certificate     /etc/letsencrypt/live/staging.fabioborgesoficial.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.fabioborgesoficial.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
