<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Criar conta — Mentoria Fábio Borges</title>
<link rel="stylesheet" href="assets/mb.css">
<style>
  .auth{ min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
  .auth-side{ background:var(--ink); color:#fff; padding:54px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; }
  .glow{ position:absolute; width:360px; height:360px; border-radius:50%; background:radial-gradient(circle,rgba(72,161,254,.5),transparent 70%); filter:blur(20px); left:-80px; bottom:10%; }
  .auth-form{ display:flex; align-items:center; justify-content:center; padding:40px; }
  .auth-card{ width:100%; max-width:410px; }
  .gbtn{ width:100%; display:flex; align-items:center; justify-content:center; gap:10px; padding:13px; border-radius:980px; border:1px solid var(--line-2); background:#fff; font-weight:600; font-size:15px; }
  .gbtn:hover{ background:var(--surface-2); }
  .sep{ display:flex; align-items:center; gap:14px; color:var(--faint); font-size:13px; margin:20px 0; }
  .sep::before,.sep::after{ content:""; flex:1; height:1px; background:var(--line); }
  .perk{ display:flex; gap:12px; align-items:center; margin-top:16px; color:rgba(255,255,255,.85); font-size:15px; }
  .perk .pk{ width:30px; height:30px; border-radius:9px; background:rgba(72,161,254,.2); color:var(--blue); display:grid; place-items:center; flex:none; }
  .z{ position:relative; z-index:2; }
  @media (max-width:820px){ .auth{ grid-template-columns:1fr; } .auth-side{ display:none; } }
</style>
</head>
<body>
<div class="auth">
  <div class="auth-side">
    <div class="glow"></div>
    <a class="logo z" href="home.html" style="filter:brightness(0) invert(1)"><img src="assets/mb-logo.png" alt="MB"><span class="lk"><b style="color:#fff">Fábio Borges</b><span style="color:rgba(255,255,255,.6)">Mentoria Profissional em Estética</span></span></a>
    <div class="z">
      <h2 style="color:#fff;font-size:30px;max-width:18ch">Comece grátis. Evolua sem limites.</h2>
      <div style="margin-top:26px">
        <div class="perk"><span class="pk"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg></span>Acesso imediato a 2 cursos intro</div>
        <div class="perk"><span class="pk"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg></span>Sem cartão de crédito</div>
        <div class="perk"><span class="pk"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg></span>Certificado em cada trilha</div>
      </div>
    </div>
    <div class="z" style="color:rgba(255,255,255,.45);font-size:13px">★★★★★ 4,9 de avaliação média entre alunas.</div>
  </div>

  <div class="auth-form">
    <div class="auth-card">
      <h1 style="font-size:30px">Criar conta</h1>
      <p class="muted" style="margin:10px 0 26px">Leva menos de um minuto.</p>

      <button class="gbtn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
        Cadastrar com Google
      </button>
      <div class="sep">ou com e-mail</div>

      <form class="col gap16" onsubmit="return false">
        <div class="field"><label>Nome completo</label><input class="input" placeholder="Maria Silva"></div>
        <div class="field"><label>E-mail</label><input class="input" type="email" placeholder="voce@email.com"></div>
        <div class="grid g2" style="gap:14px">
          <div class="field"><label>Senha</label><input class="input" type="password" placeholder="••••••••"></div>
          <div class="field"><label>Confirmar</label><input class="input" type="password" placeholder="••••••••"></div>
        </div>
        <label class="flex aic gap12" style="font-size:13.5px;color:var(--ink-2)"><input type="checkbox" style="width:17px;height:17px;accent-color:var(--blue)"> Concordo com os <a href="#" class="blue">Termos</a> e <a href="#" class="blue">Privacidade</a>.</label>
        <button class="btn btn-primary btn-lg btn-block">Criar minha conta</button>
      </form>

      <p class="muted center" style="margin-top:22px;font-size:14px">Já tem conta? <a href="login.html" class="blue" style="font-weight:600">Entrar</a></p>
    </div>
  </div>
</div>
</body>
</html>
