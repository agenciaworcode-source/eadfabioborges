  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-family:inherit; cursor:pointer; }\nh1,h2,h3,h4{ margin:0; font-weight:600; letter-spacing:-0.035em; line-height:1.07; }\nh1{ font-size:clamp(40px,6vw,68px); }\nh2{ font-size:clamp(30px,4vw,44px); }\nh3{ font-size:24px; }\np{ margin:0; }\nsmall{ font-size:13px; }\n\n.muted{ color:var(--muted); }\n.faint{ color:var(--faint); }\n.blue{ color:var(--blue-600); }\n.center{ text-align:center; }\n.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 28px; }\n.eyebrow{ font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--blue-600); }\n\n/* ---------- buttons ---------- */\n.btn{\n  display:inline-flex; align-items:center; justify-content:center; gap:8px;\n  padding:13px 22px; border-radius:980px; border:1px solid transparent;\n  font-size:15px; font-weight:600; letter-spacing:-0.01em;\n  transition:transform .15s ease, background .2s ease, box-shadow .2s ease, border-color .2s;\n  white-space:nowrap;\n}\n.btn:active{ transform:scale(.97); }\n.btn-primary{ background:var(--indigo); color:#fff; box-shadow:var(--shadow-blue); }\n.btn-primary:hover{ background:var(--indigo-600); }\n.btn-dark{ background:var(--ink); color:#fff; }\n.btn-dark:hover{ background:#000; }\n.btn-ghost{ background:transparent; color:var(--ink); border-color:var(--line-2); }\n.btn-ghost:hover{ border-color:var(--ink); }\n.btn-soft{ background:var(--blue-tint); color:var(--blue-700); }\n.btn-soft:hover{ background:#dcecff; }\n.btn-lg{ padding:16px 30px; font-size:16px; }\n.btn-sm{ padding:9px 16px; font-size:14px; }\n.btn-block{ width:100%; }\n.btn-icn{ width:40px; height:40px; padding:0; border-radius:50%; }\n\n/* ---------- chips / badges ---------- */\n.badge{\n  display:inline-flex; align-items:center; gap:6px;\n  padding:5px 11px; border-radius:980px; font-size:12px; font-weight:600;\n  background:#f0f0f2; color:var(--ink-2); letter-spacing:0;\n}\n.badge.blue{ background:var(--blue-tint); color:var(--blue-700); }\n.badge.green{ background:var(--green-tint); color:#178a4a; }\n.badge.dot::before{ content:\"\"; width:6px; height:6px; border-radius:50%; background:currentColor; }\n.badge-line{ border:1px solid var(--line-2); background:transparent; }\n\n/* plan badge */\n.plan-badge{\n  display:inline-flex; align-items:center; gap:7px;\n  padding:6px 13px; border-radius:980px; font-size:12px; font-weight:600;\n  border:1px solid transparent;\n}\n.plan-badge::before{ content:\"\"; width:8px; height:8px; border-radius:50%; background:currentColor; }\n.plan-free{ background:#f0f0f2; color:var(--plan-free); }\n.plan-prata{ background:#eef1f4; color:#6b7682; }\n.plan-ouro{ background:var(--blue-tint); color:var(--blue-700); }\n.plan-diamante{ background:#1d1d1f; color:#fff; }\n.plan-diamante::before{ background:var(--blue); }\n\n/* ---------- cards / surfaces ---------- */\n.card{\n  background:var(--surface); border:1px solid var(--line);\n  border-radius:var(--r-lg); box-shadow:var(--shadow-xs);\n}\n.card-pad{ padding:24px; }\n.soft-divider{ height:1px; background:var(--line); border:0; margin:0; }\n\n/* ---------- inputs ---------- */\n.field{ display:flex; flex-direction:column; gap:7px; }\n.field label{ font-size:13px; font-weight:600; color:var(--ink-2); }\n.input{\n  width:100%; padding:13px 15px; border-radius:var(--r);\n  border:1px solid var(--line-2); background:#fff; color:var(--ink);\n  font-size:15px; font-family:inherit; transition:border-color .15s, box-shadow .15s;\n}\n.input::placeholder{ color:var(--faint); }\n.input:focus{ outline:none; border-color:var(--indigo); box-shadow:0 0 0 4px rgba(92,116,180,.16); }\n.input-icn{ position:relative; }\n.input-icn .input{ padding-left:44px; }\n.input-icn svg{ position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--faint); }\n\n/* ---------- progress ---------- */\n.progress{ height:7px; background:#e9e9ec; border-radius:980px; overflow:hidden; }\n.progress > span{ display:block; height:100%; background:linear-gradient(90deg,var(--blue),var(--indigo)); border-radius:980px; }\n.ring{ --val:0; --size:128px; width:var(--size); height:var(--size); display:grid; place-items:center; border-radius:50%;\n  background:conic-gradient(var(--blue) calc(var(--val)*1%), #e9e9ec 0); }\n.ring > div{ width:calc(var(--size) - 18px); height:calc(var(--size) - 18px); background:#fff; border-radius:50%; display:grid; place-items:center; flex-direction:column; text-align:center; }\n\n/* ---------- avatar ---------- */\n.avatar{ width:40px; height:40px; border-radius:50%; background:var(--blue); color:#fff; display:inline-grid; place-items:center; font-weight:600; font-size:15px; overflow:hidden; flex:none; }\n.avatar img{ width:100%; height:100%; object-fit:cover; }\n.avatar.lg{ width:96px; height:96px; font-size:34px; }\n.avatar.sm{ width:32px; height:32px; font-size:13px; }\n\n/* ---------- logo ---------- */\n.logo{ display:inline-flex; align-items:center; gap:11px; }\n.logo img{ height:30px; width:auto; }\n.logo .lk{ display:flex; flex-direction:column; line-height:1.05; }\n.logo .lk b{ font-size:15px; font-weight:600; letter-spacing:-.02em; }\n.logo .lk span{ font-size:10.5px; color:var(--muted); letter-spacing:.02em; }\n\n/* ---------- course thumb placeholder ---------- */\n.thumb{\n  position:relative; aspect-ratio:16/10; border-radius:var(--r); overflow:hidden;\n  background:linear-gradient(150deg,#1d2433,#2b3b5e 55%,#3f63a8);\n  display:grid; place-items:center; color:rgba(255,255,255,.92);\n}\n.thumb.b2{ background:linear-gradient(150deg,#0e2a4d,#1f6fd6 60%,#48a1fe); }\n.thumb.b3{ background:linear-gradient(150deg,#23252b,#3a3d46 60%,#5b6b8c); }\n.thumb.b4{ background:linear-gradient(150deg,#102a44,#21507f 55%,#48a1fe); }\n.thumb .cat-icn{ width:54px; height:54px; opacity:.95; }\n.thumb::after{ content:\"\"; position:absolute; inset:0; background:radial-gradient(120% 120% at 80% 10%,rgba(255,255,255,.18),transparent 50%); }\n\n/* ---------- app shell (dashboard) ---------- */\n.shell{ display:grid; grid-template-columns:256px 1fr; min-height:100vh; }\n.side{\n  background:#fff; border-right:1px solid var(--line); padding:22px 16px;\n  display:flex; flex-direction:column; gap:6px; position:sticky; top:0; height:100vh;\n}\n.side .brand{ padding:6px 10px 18px; }\n.nav-group{ font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); padding:14px 12px 6px; }\n.nav-link{\n  display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:11px;\n  color:var(--ink-2); font-size:14.5px; font-weight:500; transition:background .15s, color .15s;\n}\n.nav-link svg{ width:19px; height:19px; flex:none; color:var(--faint); }\n.nav-link:hover{ background:var(--surface-2); }\n.nav-link.active{ background:var(--blue-tint); color:var(--blue-700); }\n.nav-link.active svg{ color:var(--blue-600); }\n.side .user{ margin-top:auto; display:flex; align-items:center; gap:11px; padding:12px; border-radius:13px; background:var(--surface-2); border:1px solid var(--line); }\n\n.side.admin{ background:#16181d; border-right-color:#23262d; }\n.side.admin .nav-link{ color:#b6bcc6; }\n.side.admin .nav-link svg{ color:#7c828c; }\n.side.admin .nav-link:hover{ background:#20232a; }\n.side.admin .nav-link.active{ background:rgba(72,161,254,.16); color:#9ecbff; }\n.side.admin .nav-link.active svg{ color:var(--blue); }\n.side.admin .nav-group{ color:#6a707a; }\n.side.admin .user{ background:#1d2026; border-color:#2a2e36; color:#fff; }\n\n.main{ display:flex; flex-direction:column; min-width:0; }\n.topbar{\n  height:68px; display:flex; align-items:center; justify-content:space-between;\n  padding:0 32px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.8);\n  backdrop-filter:saturate(180%) blur(16px); position:sticky; top:0; z-index:20;\n}\n.crumb{ font-size:14px; color:var(--muted); display:flex; gap:8px; align-items:center; }\n.crumb b{ color:var(--ink); font-weight:600; }\n.content{ padding:32px; }\n.content.wide{ padding:36px 40px; }\n\n/* ---------- public nav ---------- */\n.pubnav{\n  position:sticky; top:0; z-index:30; height:60px; display:flex; align-items:center;\n  background:rgba(242,242,242,.72); backdrop-filter:saturate(180%) blur(18px);\n  border-bottom:1px solid rgba(0,0,0,.06);\n}\n.pubnav .wrap{ display:flex; align-items:center; justify-content:space-between; width:100%; }\n.pubnav .links{ display:flex; gap:30px; }\n.pubnav .links a{ font-size:14px; color:var(--ink-2); font-weight:500; }\n.pubnav .links a:hover{ color:var(--blue-600); }\n\n/* ---------- footer ---------- */\n.foot{ background:#fff; border-top:1px solid var(--line); padding:54px 0 30px; margin-top:80px; }\n.foot .cols{ display:grid; grid-template-columns:1.4fr repeat(3,1fr); gap:32px; }\n.foot h4{ font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); margin-bottom:14px; font-weight:600; }\n.foot a{ display:block; color:var(--ink-2); font-size:14px; padding:5px 0; }\n.foot a:hover{ color:var(--blue-600); }\n.foot .bottom{ display:flex; justify-content:space-between; align-items:center; margin-top:40px; padding-top:22px; border-top:1px solid var(--line); color:var(--faint); font-size:13px; }\n\n/* ---------- tables ---------- */\n.tbl{ width:100%; border-collapse:collapse; font-size:14px; }\n.tbl th{ text-align:left; font-weight:600; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; padding:13px 16px; border-bottom:1px solid var(--line); }\n.tbl td{ padding:14px 16px; border-bottom:1px solid var(--line); color:var(--ink-2); }\n.tbl tr:last-child td{ border-bottom:0; }\n.tbl tr:hover td{ background:var(--surface-2); }\n\n/* ---------- stat card ---------- */\n.stat{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:22px; }\n.stat .lbl{ font-size:13px; color:var(--muted); display:flex; align-items:center; gap:8px; }\n.stat .num{ font-size:34px; font-weight:600; letter-spacing:-.03em; margin-top:10px; }\n.stat .delta{ font-size:13px; font-weight:600; margin-top:6px; }\n.stat .delta.up{ color:#178a4a; }\n.stat .delta.down{ color:#d23b3b; }\n\n/* ---------- access gate ---------- */\n.gate{ position:relative; }\n.gate-overlay{\n  position:absolute; inset:0; border-radius:inherit;\n  background:rgba(255,255,255,.66); backdrop-filter:blur(3px);\n  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; padding:20px;\n}\n.gate-overlay .lock{ width:42px; height:42px; border-radius:50%; background:var(--ink); color:#fff; display:grid; place-items:center; }\n\n/* utils */\n.grid{ display:grid; gap:24px; }\n.g2{ grid-template-columns:repeat(2,1fr); }\n.g3{ grid-template-columns:repeat(3,1fr); }\n.g4{ grid-template-columns:repeat(4,1fr); }\n.flex{ display:flex; }\n.between{ justify-content:space-between; }\n.aic{ align-items:center; }\n.gap8{ gap:8px; } .gap12{ gap:12px; } .gap16{ gap:16px; } .gap24{ gap:24px; }\n.col{ display:flex; flex-direction:column; }\n.mt8{margin-top:8px;} .mt16{margin-top:16px;} .mt24{margin-top:24px;} .mt40{margin-top:40px;}\n.tag-lvl{ font-size:12px; font-weight:600; color:var(--muted); }\n.price{ font-weight:600; letter-spacing:-.02em; }\n\n/* segmented tabs */\n.tabs{ display:inline-flex; background:#e9e9ec; padding:4px; border-radius:980px; gap:2px; }\n.tabs button, .tabs a{ padding:8px 18px; border-radius:980px; border:0; background:transparent; font-size:14px; font-weight:600; color:var(--muted); }\n.tabs .on{ background:#fff; color:var(--ink); box-shadow:var(--shadow-xs); }\n\n/* mobile frame helper (for gallery) */\n.devicewrap{ display:flex; gap:40px; flex-wrap:wrap; align-items:flex-start; }\n\n@media (max-width:1000px){\n  .g4{ grid-template-columns:repeat(2,1fr); }\n  .g3{ grid-template-columns:1fr 1fr; }\n  .foot .cols{ grid-template-columns:1fr 1fr; }\n}\n@media (max-width:720px){\n  .shell{ grid-template-columns:1fr; }\n  .side{ display:none; }\n  .g2,.g3,.g4{ grid-template-columns:1fr; }\n  .pubnav .links{ display:none; }\n  .foot .cols{ grid-template-columns:1fr 1fr; }\n  .content,.content.wide{ padding:20px; }\n}\n<\u002Fstyle>\n<style>\n  .ix-hero{ padding:54px 0 30px; }\n  .ix-hero h1{ font-size:clamp(34px,5vw,52px); }\n  .palette{ display:flex; gap:14px; flex-wrap:wrap; margin-top:26px; }\n  .sw{ display:flex; align-items:center; gap:11px; background:#fff; border:1px solid var(--line); border-radius:980px; padding:7px 16px 7px 7px; font-size:13px; font-weight:500; }\n  .sw .dot{ width:26px; height:26px; border-radius:50%; flex:none; box-shadow:inset 0 0 0 1px rgba(0,0,0,.07); }\n  .sech{ display:flex; align-items:baseline; gap:14px; margin:48px 0 20px; }\n  .sech h2{ font-size:24px; }\n  .sech .ct{ font-size:13px; color:var(--faint); font-weight:600; }\n  .gal{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:24px; }\n  .scard{ display:block; text-align:left; border:0; background:none; padding:0; cursor:pointer; font-family:inherit; width:100%; }\n  .frame{ position:relative; width:100%; aspect-ratio:1440/900; border-radius:var(--r); overflow:hidden; border:1px solid var(--line-2); background:#fff; box-shadow:var(--shadow-xs); transition:transform .18s, box-shadow .18s; }\n  .scard:hover .frame{ transform:translateY(-4px); box-shadow:var(--shadow); border-color:var(--indigo); }\n  .frame iframe{ position:absolute; top:0; left:0; width:400%; height:400%; border:0; transform:scale(.25); transform-origin:top left; pointer-events:none; background:#fff; }\n  .scard .cap{ display:flex; align-items:center; justify-content:space-between; margin-top:11px; }\n  .scard .cap b{ font-size:14.5px; font-weight:600; }\n  .scard .cap .rt{ font-size:12px; color:var(--faint); font-family:ui-monospace,monospace; }\n  .num-pill{ width:22px; height:22px; border-radius:50%; background:var(--indigo-tint); color:var(--indigo-700); font-size:11px; font-weight:700; display:inline-grid; place-items:center; margin-right:8px; }\n  .devs{ display:flex; gap:34px; flex-wrap:wrap; ges.com.br\\u003c/a>\\u003c/div>\\n    \\u003c/div>\\n    \\u003cdiv class=\\\"bottom\\\">\\u003cspan>© 2026 Fábio Borges Mentoria. Todos os direitos reservados.\\u003c/span>\\u003cspan>Termos · Privacidade\\u003c/span>\\u003c/div>\\n  \\u003c/div>\\n\\u003c/footer>\\n\\n\\u003c/body>\\n\\u003c/html>\\n\",\"planos.html\":\"\\u003c!DOCTYPE html>\\n\\u003chtml lang=\\\"pt-BR\\\">\\n\\u003chead>\\n\\u003cmeta charset=\\\"UTF-8\\\">\\n\\u003cmeta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1\\\">\\n\\u003ctitle>Planos — Mentoria Fábio Borges\\u003c/title>\\n\\n\\u003cstyle>\\n  .phead{ padding:64px 0 10px; text-align:center; }\\n  .plans{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-top:46px; align-items:start; }\\n  .pcard{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:26px 22px; }\\n  .pcard.feat{ border:1.5px solid var(--blue); box-shadow:var(--shadow-blue); position:relative; }\\n  .pcard.feat .ribbon{ position:absolute; top:-12px; left:50%; transform:translateX(-50%); background:var(--blue); color:#fff; font-size:11px; font-weight:600; padding:5px 13px; border-radius:980px; }\\n  .pcard .pp{ font-size:34px; font-weight:600; letter-spacing:-.03em; margin:12px 0 2px; }\\n  .pcard .pp small{ font-size:14px; color:var(--muted); font-weight:500; }\\n  .pcard ul{ list-style:none; padding:0; margin:18px 0 22px; display:flex; flex-direction:column; gap:10px; }\\n  .pcard li{ font-size:13.5px; color:var(--ink-2); display:flex; gap:9px; align-items:flex-start; }\\n  .pcard li svg{ color:var(--blue-600); flex:none; margin-top:1px; }\\n  .cmp{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); overflow:hidden; margin-top:30px; }\\n  .cmp table{ width:100%; border-collapse:collapse; }\\n  .cmp th,.cmp td{ padding:15px 18px; text-align:center; font-size:14px; border-bottom:1px solid var(--line); }\\n  .cmp th:first-child,.cmp td:first-child{ text-align:left; color:var(--ink) 003ctd class=\\\"no\\\">—\\u003c/td>\\u003ctd class=\\\"hl no\\\">—\\u003c/td>\\u003ctd class=\\\"yes\\\">✓\\u003c/td>\\u003c/tr>\\n        \\u003ctr>\\u003ctd>Suporte\\u003c/td>\\u003ctd>Comunidade\\u003c/td>\\u003ctd>E-mail\\u003c/td>\\u003ctd class=\\\"hl\\\">Prioritário\\u003c/td>\\u003ctd>Dedicado\\u003c/td>\\u003c/tr>\\n        \\u003ctr>\\u003ctd>Preço\\u003c/td>\\u003ctd>Grátis\\u003c/td>\\u003ctd>R$ 97\\u003c/td>\\u003ctd class=\\\"hl\\\">\\u003cb>R$ 197\\u003c/b>\\u003c/td>\\u003ctd>R$ 397\\u003c/td>\\u003c/tr>\\n      \\u003c/tbody>\\n    \\u003c/table>\\n  \\u003c/div>\\n\\u003c/section>\\n\\n\\u003c!-- FAQ -->\\n\\u003csection class=\\\"section wrap\\\" style=\\\"padding-top:0\\\">\\n  \\u003cdiv class=\\\"center\\\">\\u003cspan class=\\\"eyebrow\\\">Dúvidas\\u003c/span>\\u003ch2 style=\\\"margin-top:12px;font-size:34px\\\">Perguntas frequentes\\u003c/h2>\\u003c/div>\\n  \\u003cdiv class=\\\"faq\\\" style=\\\"margin-top:30px\\\">\\n    \\u003cdetails class=\\\"qa\\\" open>\\u003csummary>Posso cancelar quando quiser?\\u003cspan class=\\\"pm\\\">+\\u003c/span>\\u003c/summary>\\u003cp>Sim. Não há fidelidade — você cancela a renovação a qualquer momento e mantém o acesso até o fim do período pago.\\u003c/p>\\u003c/details>\\n    \\u003cdetails class=\\\"qa\\\">\\u003csummary>Qual a diferença entre assinatura e compra avulsa?\\u003cspan class=\\\"pm\\\">+\\u003c/span>\\u003c/summary>\\u003cp>A assinatura libera vários cursos enquanto ativa. A compra avulsa dá acesso vitalício a um curso específico, mesmo sem assinatura.\\u003c/p>\\u003c/details>\\n    \\u003cdetails class=\\\"qa\\\">\\u003csummary>Os certificados são reconhecidos?\\u003cspan class=\\\"pm\\\">+\\u003c/span>\\u003c/summary>\\u003cp>Cada certificado é digital, possui um código único e pode ser verificado publicamente na nossa página de verificação.\\u003c/p>\\u003c/details>\\n    \\u003cdetails class=\\\"qa\\\">\\u003csummary>Posso fazer upgrade depois?\\u003cspan class=\\\"pm\\\">+\\u003c/span>\\u003c/summary>\\u003cp>Sim, a qualquer momento pelo seu painel em \\\"Meu Plano\\\". O valor é ajustado proporcionalmente.\\u003c/p>\\u003c/details>\\n  \\u003c/div>\\n\\u003c/section>\\n\\n\\u003csection class=\\\"wrap\\\" style=\\\"padding-bottom:40px\\\">\\n  \\u003cdiv style=\\\"background:var(--ink);color:#fff;border-radius:var(--r-xl);padding:50px;text-align:center\\\">\\n    \\u003ch2 style=\\\"color:#fff\\\">Comece hoje, evolua sempre\\u003c/h2>\\n    \\u003cp style=\\\"color:rgba(255,255,255,.7);margin:14px auto 26px;max-width:44ch\\\">Crie sua conta grátis e experimente a metodologia antes de assinar.\\u003c/p>\\n    \\u003ca class=\\\"btn btn-primary btn-lg\\\" href=\\\"cadastro.html\\\">Criar conta grátis\\u003c/a>\\n  \\u003c/div>\\n\\u003c/section>\\n\\n\\u003cfooter class=\\\"foot\\\">\\u003cdiv class=\\\"wrap\\\">\\u003cdiv class=\\\"cols\\\">\\n  \\u003cdiv>\\u003ca class=\\\"logo\\\" href=\\\"home.html\\\">\\u003cimg src=\\\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABJoAAAIZCAYAAADunVXKAAAACXBIWXMAABYlAAAWJQFJUiTwAAAgAElEQVR4nOzdPW9c6bom5uec6ciJ9A+k+QXSxAzEk1XWmrSAA9YOHXWdpEDABnq1DQNEJac6GKe7GLjgbKjEKEe7OAATJxZTJ1v8BW7O2AbmADPbARdblJrfXGs971rruoBG79ZH1Y3dXRTrrud93r/729/+FsA4HK7O3kZEHM33vuQmAQAAYIh+yA4AdKqq/z5LzAAAAMBA/Z2JJhiHeprpr/U//mtTTVCuw9XZSUS8zs4BALTic0T8Vv/1+frHjuZ7v+VFguaYaILxmN3431WYaoIiHa7OZhHxY3YOAKA1H277wcPVWUTERUR8qX9oV//9upj64sNi+sBEE4zA4ersdVz9gfXqxg+baoICHa7OvkTEm+wcAECxLuPrJNSu/vt1GWUyinQmmmAc5vFtyRRhqgmKc7g6m4eSCQC436v4OhX1h+moejLqPL4ezfv970fzvV03ERkzE00wcHdMM10z1QSFeOC1CgDQpNP4WkApoWiUiSYYvlnc/ca1ClNNUIrbJg8BANpwPQn1+17I73ZE7eq/f1FA8VQmmmDgHrHvxVQTJDPNBAAU7jyuvlf5HFcllF1Q3MlEEwxYfXvVQ/teqjDVBNlMMwEAJXtX//VjRPwcEXG4OruIunSKq+JplxWOsphoggF7wu1VppogyeHq7G1E/DU7BwBAA07jqnzaKZ7Gy0QTDNQjp5muVWGqCbJU2QEAABryof7r53rnk+JphEw0wUAdrs52cct1p/cw1QQdM80EAIzIZVyVTidxVTx9SU1Da0w0wQAdrs7242klU4SpJsiwyg4AANCRV3G14+nHiIjD1dl5RKzjqnT6nJiLhploggF6xjTTNVNN0JG6EP5Ldg4AgAJcxNWk08r7kf4z0QQD88xppmuzsC8GulJlBwAAKMSbiPgpIn66Mel0onTqJxNNMDCHq7OTqMdRn+ \\u003c/div>\\n  \\u003cdiv>\\u003ch4>Contato\\u003c/h4>\\u003ca href=\\\"#\\\">Instagram\\u003c/a>\\u003ca href=\\\"#\\\">WhatsApp\\u003c/a>\\u003c/div>\\n\\u003c/div>\\u003cdiv class=\\\"bottom\\\">\\u003cspan>© 2026 Fábio Borges Mentoria.\\u003c/span>\\u003cspan>Termos · Privacidade\\u003c/span>\\u003c/div>\\u003c/div>\\u003c/footer>\\n\\u003c/body>\\n\\u003c/html>\\n\",\"curso.html\":\"\\u003c!DOCTYPE html>\\n\\u003chtml lang=\\\"pt-BR\\\">\\n\\u003chead>\\n\\u003cmeta charset=\\\"UTF-8\\\">\\n\\u003cmeta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1\\\">\\n\\u003ctitle>Eletroterapia & Recursos Estéticos — Mentoria Fábio Borges\\u003c/title>\\n\\n\\u003cstyle>\\n  .cl-hero{ background:var(--ink); color:#fff; padding:48px 0 56px; }\\n  .cl-grid{ display:grid; grid-template-columns:1fr 372px; gap:40px; align-items:start; }\\n  .cl-hero .cl-grid{ align-items:center; }\\n  .cl-hero .meta{ display:flex; gap:14px; flex-wrap:wrap; color:rgba(255,255,255,.7); font-size:14px; margin-top:18px; }\\n  .cl-hero h1{ font-size:clamp(30px,4vw,44px); margin-top:14px; }\\n  .cl-thumb{ aspect-ratio:16/9; border-radius:var(--r-lg); overflow:hidden; background:linear-gradient(150deg,#0e2a4d,#1f6fd6 60%,#48a1fe); display:grid; place-items:center; box-shadow:var(--shadow-lg); position:relative; }\\n  .cl-thumb .play{ width:74px; height:74px; border-radius:50%; background:rgba(255,255,255,.95); display:grid; place-items:center; color:var(--ink); }\\n  .panel{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--shadow); overflow:hidden; }\\n  .body-grid{ display:grid; grid-template-columns:1fr 372px; gap:40px; align-items:start; padding:48px 0; }\\n  .sticky{ position:sticky; top:84px; }\\n  .sec{ margin-bottom:40px; }\\n  .sec h2{ font-size:26px; margin-bottom:18px; }\\n  .mod{ border:1px solid var(--line); border-radius:var(--r); margin-bottom:10px; overflow:hidden; background:#fff; }\\n  .mod summary{ list-style:none; cursor:pointer; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; font-weight:600; }\\n  .mod summary::-webkit-details-marker{ display:none; }\\n  .mod .lessons{ border-top:1px solid var(--line); }\\n  .mod .lesson{ display:flex; align-items:center; gap:12px; padding:13px 18px; font-size:14.5px; color:var(--ink-2); border-bottom:1px solid var(--line); }\\n  .mod .lesson:last-child{ border-bottom:0; }\\n  .mod .lesson .pl{ width:26px; height:26px; border-radius:50%; background:var(--blue-tint); color:var(--blue-600); display:grid; place-items:center; flex:none; }\\n  .mod .lesson .dur{ margin-left:auto; color:var(--faint); font-size:13px; }\\n  .mod[open] summary .chev{ transform:rotate(180deg); }\\n  .chev{ transition:transform .2s; color:var(--faint); }\\n  .learn{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }\\n  .learn div{ display:flex; gap:11px; font-size:15px; color:var(--ink-2); }\\n  .learn svg{ color:var(--blue-600); flex:none; margin-top:3px; }\\n  .insta{ display:flex; gap:20px; align-items:flex-start; background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:26px; }\\n  .price-panel .pp{ font-size:38px; font-weight:600; letter-spacing:-.03em; }\\n  .price-panel .old{ color:var(--faint); text-decoration:line-through; font-size:16px; }\\n  .price-panel ul{ list-style:none; padding:0; margin:18px 0; display:flex; flex-direction:column; gap:11px; }\\n  .price-panel li{ display:flex; gap:10px; font-size:14px; color:var(--ink-2); }\\n  .price-panel li svg{ color:var(--blue-600); flex:none; }\\n  .tcard{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:24px; }\\n  @media (max-width:900px){ .cl-grid,.body-grid{ grid-template-columns:1fr; } .sticky{ position:static; } .learn{ grid-template-columns:1fr; } }\\n\\u003c/style>\\n\\u003c/head>\\n\\u003cbody>\\n\\u003cnav class=\\\"pubnav\\\">\\u003cdiv class=\\\"wrap\\\">\\n  \\u003ca class=\\\"logo\\\" href=\\\"home.htm ick=\\\"show('success')\\\">Enviar link de recuperação\\u003c/button>\\n    \\u003c/form>\\n    \\u003cp class=\\\"center\\\" style=\\\"margin-top:20px\\\">\\u003ca href=\\\"login.html\\\" class=\\\"muted\\\" style=\\\"font-size:14px\\\">← Voltar para o login\\u003c/a>\\u003c/p>\\n  \\u003c/div>\\n\\n  \\u003c!-- success state -->\\n  \\u003cdiv class=\\\"card ok\\\" id=\\\"success\\\">\\n    \\u003cdiv class=\\\"ic-top\\\">\\u003csvg width=\\\"26\\\" height=\\\"26\\\" viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" stroke-width=\\\"2.4\\\">\\u003cpath d=\\\"M22 11.08V12a10 10 0 1 1-5.93-9.14\\\"/>\\u003cpath d=\\\"m22 4-10 10.01-3-3\\\"/>\\u003c/svg>\\u003c/div>\\n    \\u003ch1 style=\\\"font-size:24px;text-align:center\\\">Verifique seu e-mail\\u003c/h1>\\n    \\u003cp class=\\\"muted center\\\" style=\\\"margin:10px 0 22px;font-size:14.5px\\\">Enviamos um link de recuperação para \\u003cb style=\\\"color:var(--ink)\\\">voce@email.com\\u003c/b>. Confira a caixa de entrada e o spam.\\u003c/p>\\n    \\u003ca class=\\\"btn btn-ghost btn-block\\\" href=\\\"login.html\\\">Voltar para o login\\u003c/a>\\n    \\u003cp class=\\\"center muted\\\" style=\\\"margin-top:16px;font-size:13px\\\">Não recebeu? \\u003ca href=\\\"#\\\" class=\\\"blue\\\" style=\\\"font-weight:600\\\">Reenviar\\u003c/a>\\u003c/p>\\n  \\u003c/div>\\n\\u003c/div>\\n\\u003cscript>\\n  function show(id){\\n    document.getElementById('form').style.display = id==='form'?'block':'none';\\n    document.getElementById('success').style.display = id==='success'?'block':'none';\\n    document.querySelectorAll('.toggle button').forEach((b,i)=>b.classList.toggle('on',(i===0)===(id==='form')));\\n  }\\n\\u003c/script>\\n\\u003c/body>\\n\\u003c/html>\\n\",\"dashboard.html\":\"\\u003c!DOCTYPE html>\\n\\u003chtml lang=\\\"pt-BR\\\">\\n\\u003chead>\\n\\u003cmeta charset=\\\"UTF-8\\\">\\n\\u003cmeta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1\\\">\\n\\u003ctitle>Dashbo
